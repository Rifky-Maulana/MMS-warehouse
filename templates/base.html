<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Gudang MMS{% endblock %}</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; background: #f5f5f4; color: #1c1917; }
        header { background: #fff; border-bottom: 1px solid #e7e5e4; padding: 1rem 1.5rem; display: flex; justify-content: space-between; align-items: center; }
        main { max-width: 960px; margin: 0 auto; padding: 1.5rem; }
        .card { background: #fff; border: 1px solid #e7e5e4; border-radius: 10px; padding: 1.25rem; margin-bottom: 1rem; }
        h1, h2 { margin-top: 0; }
        a { color: #1d4ed8; }
        button { background: #1d4ed8; color: #fff; border: none; border-radius: 6px; padding: .5rem 1rem; cursor: pointer; font-size: 1rem; }
        input { width: 100%; padding: .5rem; border: 1px solid #d6d3d1; border-radius: 6px; box-sizing: border-box; }
        label { display: block; margin-bottom: .75rem; }
    </style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
