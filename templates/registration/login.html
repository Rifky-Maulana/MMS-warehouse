{% extends "base.html" %}
{% block title %}Masuk — Gudang MMS{% endblock %}
{% block body %}
<main>
    <div class="card" style="max-width:360px; margin:3rem auto;">
        <h1>Masuk</h1>
        {% if form.errors %}
            <p style="color:#b91c1c;">Username atau password salah.</p>
        {% endif %}
        <form method="post">
            {% csrf_token %}
            <label>Username {{ form.username }}</label>
            <label>Password {{ form.password }}</label>
            <button type="submit">Masuk</button>
        </form>
    </div>
</main>
{% endblock %}
