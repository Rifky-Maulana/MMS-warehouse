{% extends "base.html" %}
{% block title %}Masuk — Merapi Medika Solusindo{% endblock %}
{% block body %}
<div class="max-w-sm mx-auto mt-12 bg-white rounded-2xl shadow-soft p-7">
    <h1 class="text-xl font-semibold text-brand-ink mb-1">Masuk</h1>
    <p class="text-sm text-brand-muted mb-5">Merapi Medika Solusindo</p>
    {% if form.errors %}<p class="text-red-500 text-sm mb-3">Username atau password salah.</p>{% endif %}
    <form method="post" class="space-y-3">
        {% csrf_token %}
        <div>
            <label class="block text-sm text-slate-600 mb-1">Username</label>
            <input type="text" name="username" autofocus class="w-full bg-brand-soft rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-brand/40">
        </div>
        <div>
            <label class="block text-sm text-slate-600 mb-1">Password</label>
            <input type="password" name="password" class="w-full bg-brand-soft rounded-xl px-3 py-2 outline-none focus:ring-2 focus:ring-brand/40">
        </div>
        <button type="submit" class="w-full bg-brand text-white rounded-xl py-2.5 font-medium hover:bg-brand-dark transition">Masuk</button>
    </form>
</div>
{% endblock %}
